<!doctype html><html><head><meta charset="utf-8"><title>Primary Palette</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="gap:14px;padding:24px;">
  <style>
    .sw { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
    .chip { width:96px; height:72px; border-radius:8px; box-shadow: 0 0 0 1px rgba(38,37,30,0.1); }
    .name { font-family: var(--font-display); font-size:12px; color: var(--fg-1); font-weight:500; letter-spacing:-0.1px; }
    .hex { font-family: var(--font-mono); font-size:10.5px; color: var(--fg-3); }
  </style>
  <div class="sw"><div class="chip" style="background:#26251e"></div><div class="name">Ink</div><div class="hex">#26251E</div></div>
  <div class="sw"><div class="chip" style="background:#f2f1ed"></div><div class="name">Cream</div><div class="hex">#F2F1ED</div></div>
  <div class="sw"><div class="chip" style="background:#e6e5e0"></div><div class="name">Light</div><div class="hex">#E6E5E0</div></div>
  <div class="sw"><div class="chip" style="background:#f54e00"></div><div class="name">Orange</div><div class="hex">#F54E00</div></div>
  <div class="sw"><div class="chip" style="background:#c08532"></div><div class="name">Gold</div><div class="hex">#C08532</div></div>
</div>
</body></html>
