<!doctype html><html><head><meta charset="utf-8"><title>Surface Scale</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card" style="padding:24px;">
  <style>
    .row { display:flex; gap:0; border-radius:8px; overflow:hidden; box-shadow: 0 0 0 1px rgba(38,37,30,0.1); }
    .step { flex:1; padding:18px 12px; display:flex; flex-direction:column; gap:4px; }
    .n { font-family: var(--font-system); font-size:10px; color: var(--fg-3); letter-spacing:0.05em; text-transform:uppercase; }
    .v { font-family: var(--font-mono); font-size:10.5px; color: var(--fg-1); }
  </style>
  <div class="row" style="height:96px;">
    <div class="step" style="background:#f7f7f4"><span class="n">100</span><span class="v">#F7F7F4</span></div>
    <div class="step" style="background:#f2f1ed"><span class="n">200</span><span class="v">#F2F1ED</span></div>
    <div class="step" style="background:#ebeae5"><span class="n">300</span><span class="v">#EBEAE5</span></div>
    <div class="step" style="background:#e6e5e0"><span class="n">400</span><span class="v">#E6E5E0</span></div>
    <div class="step" style="background:#e1e0db"><span class="n">500</span><span class="v">#E1E0DB</span></div>
  </div>
</div>
</body></html>
