<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--stack" style="padding:22px 26px;gap:10px;justify-content:center;">
  <style>
    .input{font-family:var(--font-display);font-size:15px;color:#26251e;background:transparent;padding:10px 12px;border:1px solid rgba(38,37,30,.1);border-radius:8px;outline:none;width:100%;box-sizing:border-box;}
    .input::placeholder{color:rgba(38,37,30,.4);}
    .input:focus{border-color:rgba(38,37,30,.2);box-shadow:0 4px 12px rgba(0,0,0,.1);}
    .search{position:relative;}
    .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(38,37,30,.55);}
    .search .input{padding-left:36px;}
    label{font-family:var(--font-system);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:rgba(38,37,30,.55);font-weight:500;}
  </style>
  <div class="search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="input" placeholder="Search projects, docs, shortcuts..." />
  </div>
  <input class="input" placeholder="Project name" value="ZARIS landing redesign" />
</div>
</body></html>
