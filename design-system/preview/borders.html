<!doctype html><html><head><meta charset="utf-8"><title>Borders</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:24px;gap:16px;">
  <style>
    .b{width:150px;height:104px;background:#f2f1ed;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-family:var(--font-display);color:var(--fg-1);}
    .n{font-family:var(--font-display);font-size:12px;font-weight:400;letter-spacing:0;line-height:1;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;}
    .v{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--fg-1);letter-spacing:-0.3px;}
  </style>
  <div class="b" style="border:1px solid rgba(38,37,30,0.1);"><span class="n">Primary</span><span class="v">10%</span></div>
  <div class="b" style="border:1px solid rgba(38,37,30,0.2);"><span class="n">Medium</span><span class="v">20%</span></div>
  <div class="b" style="border:1px solid rgba(38,37,30,0.55);"><span class="n">Strong</span><span class="v">55%</span></div>
  <div class="b" style="border:1px solid #26251e;"><span class="n">Solid</span><span class="v">100%</span></div>
</div>
</body></html>
