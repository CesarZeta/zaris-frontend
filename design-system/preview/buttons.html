<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:24px;gap:12px;">
  <style>
    button{font-family:var(--font-display);font-size:14px;line-height:1;font-weight:400;cursor:pointer;border:none;outline:none;transition:color .15s ease, box-shadow .2s ease, background .15s ease;}
    .primary{background:#26251e;color:#f2f1ed;padding:10px 14px;border-radius:8px;}
    .primary:hover{background:#1b1a15;}
    .surface{background:#ebeae5;color:#26251e;padding:10px 12px 10px 14px;border-radius:8px;box-shadow:0 0 0 1px rgba(38,37,30,.1);}
    .surface:hover{color:#cf2d56;}
    .accent{background:#f54e00;color:#f2f1ed;padding:10px 14px;border-radius:8px;}
    .accent:hover{background:#d84300;}
    .ghost{background:rgba(38,37,30,.06);color:rgba(38,37,30,.55);padding:6px 12px;border-radius:8px;}
    .ghost:hover{color:#cf2d56;background:rgba(38,37,30,.1);}
  </style>
  <button class="primary">Start a project</button>
  <button class="surface">Open composer</button>
  <button class="accent">Get ZARIS</button>
  <button class="ghost">Dismiss</button>
</div>
</body></html>
