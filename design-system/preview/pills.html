<!doctype html><html><head><meta charset="utf-8"><title>Pills & Tags</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:24px;gap:10px;">
  <style>
    .pill{font-family:var(--font-display);font-size:14px;line-height:1;padding:4px 10px;border-radius:9999px;background:#e6e5e0;color:rgba(38,37,30,.6);cursor:pointer;border:none;transition:color .15s ease, background .15s ease;}
    .pill:hover{color:#cf2d56;}
    .pill--active{background:#e1e0db;color:rgba(38,37,30,.9);}
    .pill--dark{background:#26251e;color:#f2f1ed;}
    .pill--accent{background:rgba(245,78,0,.12);color:#f54e00;}
    .pill--dot{display:inline-flex;align-items:center;gap:6px;}
    .dot{width:6px;height:6px;border-radius:9999px;background:#1f8a65;}
  </style>
  <span class="pill">design</span>
  <span class="pill pill--active">web apps</span>
  <span class="pill">prototypes</span>
  <span class="pill pill--accent">new</span>
  <span class="pill pill--dark">pro</span>
  <span class="pill pill--dot"><span class="dot"></span>live</span>
</div>
</body></html>
