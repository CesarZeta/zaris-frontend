<!doctype html><html><head><meta charset="utf-8"><title>Status & Badges</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:24px;gap:10px;">
  <style>
    .b{font-family:var(--font-display);font-size:12px;font-weight:500;padding:4px 10px;border-radius:9999px;display:inline-flex;align-items:center;gap:6px;}
    .dot{width:6px;height:6px;border-radius:9999px;}
    .success{background:rgba(31,138,101,.14);color:#1f8a65;}
    .error{background:rgba(207,45,86,.14);color:#cf2d56;}
    .warn{background:rgba(192,133,50,.18);color:#c08532;}
    .neutral{background:#e6e5e0;color:rgba(38,37,30,.7);}
    .micro{font-family:var(--font-system);font-size:10.5px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:3px;}
  </style>
  <span class="b success"><span class="dot" style="background:#1f8a65"></span>Shipped</span>
  <span class="b warn">Draft</span>
  <span class="b error"><span class="dot" style="background:#cf2d56"></span>Failing</span>
  <span class="b neutral">Archived</span>
  <span class="micro" style="background:#f54e00;color:#f2f1ed;">NEW</span>
  <span class="micro" style="background:rgba(38,37,30,.06);color:rgba(38,37,30,.55);">BETA</span>
</div>
</body></html>
