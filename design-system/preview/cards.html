<!doctype html><html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:22px;gap:14px;align-items:stretch;">
  <style>
    .c{background:#e6e5e0;border-radius:8px;padding:16px;width:200px;box-shadow:0 0 0 1px rgba(38,37,30,.1);display:flex;flex-direction:column;gap:8px;}
    .c--elev{border-radius:10px;box-shadow:rgba(0,0,0,.14) 0 28px 70px, rgba(0,0,0,.1) 0 14px 32px, 0 0 0 1px rgba(38,37,30,.1);}
    .c--ambient{box-shadow:rgba(0,0,0,.02) 0 0 16px, rgba(0,0,0,.008) 0 0 8px, 0 0 0 1px rgba(38,37,30,.1);background:#f2f1ed;}
    .t{font-family:var(--font-display);font-size:18px;letter-spacing:-0.15px;color:#26251e;font-weight:500;}
    .d{font-family:var(--font-serif);font-size:13.5px;line-height:1.4;color:rgba(38,37,30,.55);}
    .cap{font-family:var(--font-system);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(38,37,30,.55);}
  </style>
  <div class="c"><span class="cap">Ring · default</span><span class="t">Flat card</span><span class="d">Ring border, no shadow. The workhorse.</span></div>
  <div class="c c--ambient"><span class="cap">Ambient · floating</span><span class="t">Ambient card</span><span class="d">A gentle glow. Chips, floating bars.</span></div>
  <div class="c c--elev"><span class="cap">Elevated · modal</span><span class="t">Elevated card</span><span class="d">28 + 70 blur. Modals and featured.</span></div>
</div>
</body></html>
