<!doctype html><html><head><meta charset="utf-8"><title>Semantic Colors</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:24px;gap:18px;">
  <style>
    .sw { display:flex; gap:12px; align-items:center; background: var(--surface-200); padding:10px 14px; border-radius:8px; box-shadow:0 0 0 1px rgba(38,37,30,0.1); }
    .dot { width:36px; height:36px; border-radius:8px; }
    .meta { display:flex; flex-direction:column; gap:2px; }
    .t { font-family: var(--font-display); font-size:13px; color:var(--fg-1); font-weight:500; }
    .h { font-family: var(--font-mono); font-size:10px; color: var(--fg-3); }
  </style>
  <div class="sw"><div class="dot" style="background:#cf2d56"></div><div class="meta"><span class="t">Error / Hover</span><span class="h">#CF2D56</span></div></div>
  <div class="sw"><div class="dot" style="background:#1f8a65"></div><div class="meta"><span class="t">Success</span><span class="h">#1F8A65</span></div></div>
  <div class="sw"><div class="dot" style="background:#f54e00"></div><div class="meta"><span class="t">Accent</span><span class="h">#F54E00</span></div></div>
</div>
</body></html>
