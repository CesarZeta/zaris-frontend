<!doctype html><html><head><meta charset="utf-8"><title>Navigation</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card" style="padding:0;">
  <style>
    nav{display:flex;align-items:center;justify-content:space-between;padding:18px 26px;background:rgba(242,241,237,.8);backdrop-filter:blur(12px) saturate(1.2);border-bottom:1px solid rgba(38,37,30,.1);}
    .brand{font-family:var(--font-display);font-size:18px;font-weight:500;letter-spacing:-0.9px;color:#26251e;}
    .links{display:flex;gap:22px;}
    .links a{font-family:var(--font-system);font-size:13.5px;font-weight:500;color:rgba(38,37,30,.7);text-decoration:none;}
    .links a:hover{color:#cf2d56;}
    .cta{background:#ebeae5;color:#26251e;font-family:var(--font-display);font-size:13.5px;padding:8px 12px;border-radius:8px;border:none;box-shadow:0 0 0 1px rgba(38,37,30,.1);cursor:pointer;}
    .cta:hover{color:#cf2d56;}
  </style>
  <nav>
    <div class="brand">ZARIS</div>
    <div class="links"><a href="#">docs</a><a href="#">pricing</a><a href="#">changelog</a><a href="#">blog</a></div>
    <button class="cta">Open app</button>
  </nav>
  <div style="padding:18px 26px;font-family:var(--font-serif);font-size:14px;color:rgba(38,37,30,.55);font-style:italic;">Sticky · cream w/ backdrop blur · 1px oklab bottom border</div>
</div>
</body></html>
