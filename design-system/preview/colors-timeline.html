<!doctype html><html><head><meta charset="utf-8"><title>Timeline Palette</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:24px;gap:14px;">
  <style>
    .sw { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
    .chip { width:104px; height:72px; border-radius:8px; box-shadow:0 0 0 1px rgba(38,37,30,0.1); }
    .name { font-family:var(--font-display); font-size:12.5px; color:var(--fg-1); font-weight:500; }
    .h { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-3); }
  </style>
  <div class="sw"><div class="chip" style="background:#dfa88f"></div><div class="name">Thinking</div><div class="h">#DFA88F</div></div>
  <div class="sw"><div class="chip" style="background:#9fc9a2"></div><div class="name">Grep</div><div class="h">#9FC9A2</div></div>
  <div class="sw"><div class="chip" style="background:#9fbbe0"></div><div class="name">Read</div><div class="h">#9FBBE0</div></div>
  <div class="sw"><div class="chip" style="background:#c0a8dd"></div><div class="name">Edit</div><div class="h">#C0A8DD</div></div>
</div>
</body></html>
