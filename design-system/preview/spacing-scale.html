<!doctype html><html><head><meta charset="utf-8"><title>Spacing Scale</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--stack" style="padding:22px 26px;gap:10px;justify-content:center;">
  <style>.row{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}.bar{height:10px;background:#26251e;border-radius:2px;}.n{font-family:var(--font-display);color:var(--fg-1);font-weight:500;font-size:12px;width:40px;}</style>
  <div class="row"><span class="n">4</span><span class="bar" style="width:4px"></span><span>· micro</span></div>
  <div class="row"><span class="n">8</span><span class="bar" style="width:8px"></span><span>· base</span></div>
  <div class="row"><span class="n">12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="n">16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="n">24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="n">32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="n">48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="n">64</span><span class="bar" style="width:64px"></span><span>· section</span></div>
</div>
</body></html>
