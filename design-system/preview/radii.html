<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:22px;gap:14px;">
  <style>.sw{display:flex;flex-direction:column;gap:6px;align-items:center;}.b{width:64px;height:64px;background:#e6e5e0;box-shadow:0 0 0 1px rgba(38,37,30,.1);}.n{font-family:var(--font-display);font-size:11px;color:var(--fg-1);font-weight:500;}.v{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}</style>
  <div class="sw"><div class="b" style="border-radius:2px"></div><div class="n">xs</div><div class="v">2</div></div>
  <div class="sw"><div class="b" style="border-radius:4px"></div><div class="n">md</div><div class="v">4</div></div>
  <div class="sw"><div class="b" style="border-radius:8px"></div><div class="n">lg</div><div class="v">8</div></div>
  <div class="sw"><div class="b" style="border-radius:10px"></div><div class="n">xl</div><div class="v">10</div></div>
  <div class="sw"><div class="b" style="border-radius:9999px"></div><div class="n">pill</div><div class="v">9999</div></div>
</div>
</body></html>
