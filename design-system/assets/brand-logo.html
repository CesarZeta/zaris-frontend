<!doctype html><html><head><meta charset="utf-8"><title>Logo & Mark</title><link rel="stylesheet" href="_preview.css"></head><body>
<div class="card card--center" style="padding:26px;gap:24px;flex-wrap:wrap;">

  <!-- Mark oficial: blanco sobre negro -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:88px;height:88px;background:#000;border-radius:14px;display:flex;align-items:center;justify-content:center;">
      <svg width="88" height="88" viewBox="0 0 500 500">
        <g fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 110 78 L 388 78"></path><path d="M 388 78 L 110 430"></path>
          <path d="M 388 220 L 222 430"></path><path d="M 388 362 L 334 430"></path>
        </g>
      </svg>
    </div>
    <span style="font-family:var(--font-system);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(38,37,30,.55);">Mark · Primary</span>
  </div>

  <!-- Mark inverso: ink sobre cream -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:88px;height:88px;background:#f2f1ed;border-radius:14px;border:1px solid rgba(38,37,30,.1);display:flex;align-items:center;justify-content:center;">
      <svg width="88" height="88" viewBox="0 0 500 500">
        <g fill="none" stroke="#26251e" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 110 78 L 388 78"></path><path d="M 388 78 L 110 430"></path>
          <path d="M 388 220 L 222 430"></path><path d="M 388 362 L 334 430"></path>
        </g>
      </svg>
    </div>
    <span style="font-family:var(--font-system);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(38,37,30,.55);">Mark · Inverse</span>
  </div>

  <!-- Mark flat (currentColor) -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:88px;height:88px;display:flex;align-items:center;justify-content:center;color:#26251e;">
      <svg width="88" height="88" viewBox="0 0 500 500">
        <g fill="none" stroke="currentColor" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 110 78 L 388 78"></path><path d="M 388 78 L 110 430"></path>
          <path d="M 388 220 L 222 430"></path><path d="M 388 362 L 334 430"></path>
        </g>
      </svg>
    </div>
    <span style="font-family:var(--font-system);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(38,37,30,.55);">Mark · Flat (currentColor)</span>
  </div>

  <!-- Wordmark -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="font-family:var(--font-display);font-size:44px;font-weight:500;letter-spacing:-2.2px;color:#26251e;">ZARIS</div>
    <span style="font-family:var(--font-system);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(38,37,30,.55);">Wordmark</span>
  </div>

  <!-- Lockup -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;background:#000;border-radius:7px;display:flex;align-items:center;justify-content:center;">
        <svg width="36" height="36" viewBox="0 0 500 500">
          <g fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 110 78 L 388 78"></path><path d="M 388 78 L 110 430"></path>
            <path d="M 388 220 L 222 430"></path><path d="M 388 362 L 334 430"></path>
          </g>
        </svg>
      </div>
      <div style="font-family:var(--font-display);font-size:22px;font-weight:500;letter-spacing:-1px;color:#26251e;">ZARIS</div>
    </div>
    <span style="font-family:var(--font-system);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(38,37,30,.55);">Lockup</span>
  </div>

  <!-- Favicon 32 -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:32px;height:32px;background:#000;border-radius:5px;display:flex;align-items:center;justify-content:center;">
      <svg width="32" height="32" viewBox="0 0 500 500">
        <g fill="none" stroke="#ffffff" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 110 78 L 388 78"></path><path d="M 388 78 L 110 430"></path>
          <path d="M 388 220 L 222 430"></path><path d="M 388 362 L 334 430"></path>
        </g>
      </svg>
    </div>
    <span style="font-family:var(--font-system);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(38,37,30,.55);">Favicon · 32px</span>
  </div>

</div>
</body></html>
