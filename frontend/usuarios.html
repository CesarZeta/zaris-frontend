<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZARIS — Padrón de Usuarios">
    <title>ZARIS — Usuarios</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .z-form-card { animation: z-scaleIn 0.4s var(--z-ease); }

        .z-search-panel {
            background: linear-gradient(135deg, #EDE7F6 0%, #F8F5FF 100%);
            border-radius: var(--z-radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1.5px solid #D1C4E9;
        }
        .z-search-panel__title {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--z-primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .z-search-result {
            background: var(--z-bg-card);
            border-radius: var(--z-radius);
            padding: 1rem 1.25rem;
            margin-top: 1rem;
            border: 1px solid var(--z-border);
            display: none;
            animation: z-slideDown 0.3s var(--z-ease);
        }
        .z-search-result.visible { display: block; }
        .z-search-result__name {
            font-weight: 700;
            color: var(--z-primary);
            font-size: 1.05rem;
        }
        .z-search-result__detail {
            font-size: 0.85rem;
            color: var(--z-text2);
            margin-top: 4px;
        }

        .z-form-state {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .z-form-state--new    { background: #E8F5E9; color: #2E7D32; }
        .z-form-state--edit   { background: #FFF8E1; color: #F57F17; }
        .z-form-state--view   { background: #E3F2FD; color: #1565C0; }

        .z-user-activo   { background: #E8F5E9; color: #2E7D32; }
        .z-user-inactivo { background: #FFEBEE; color: #C62828; }

        .z-password-hint {
            font-size: 0.78rem;
            color: var(--z-text3);
            margin-top: 3px;
        }
        .z-password-hint--optional { color: #F57F17; font-style: italic; }

        /* nivel badge */
        .z-nivel-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .z-nivel-1 { background: #FCE4EC; color: #880E4F; }
        .z-nivel-2 { background: #FFF8E1; color: #E65100; }
        .z-nivel-3 { background: #E8F5E9; color: #1B5E20; }
        .z-nivel-4 { background: #E3F2FD; color: #0D47A1; }
    </style>
</head>
<body>
    <div class="z-app">
        <header class="z-header">
            <a href="mainconfig.html" class="z-header__brand">
                <span>
                    <span class="z-header__title">ZARIS</span>
                    <span class="z-header__subtitle">Gestión Estatal</span>
                </span>
            </a>
            <nav class="z-header__nav">
                <a href="mainconfig.html" class="z-header__btn">← Configuración</a>
            </nav>
        </header>

        <main class="z-main">
            <nav class="z-breadcrumb">
                <a href="mainconfig.html">Configuración</a>
                <span class="z-breadcrumb__sep">›</span>
                <span class="z-breadcrumb__current">Padrón Usuarios</span>
            </nav>

            <!-- ═══ BÚSQUEDA ═══ -->
            <div class="z-search-panel" id="search-panel">
                <div class="z-search-panel__title">
                    🔍 Buscar Usuario
                </div>
                <div style="display:flex;gap:6px;margin-bottom:0.6rem;">
                    <button type="button" class="z-btn z-btn--xs z-btn--primary" id="btn-modo-texto">Aa Nombre</button>
                    <button type="button" class="z-btn z-btn--xs z-btn--ghost"   id="btn-modo-numero"># CUIL / Usuario</button>
                </div>
                <div class="z-search-box">
                    <div class="z-form-group">
                        <input type="text" class="z-input" id="search-query"
                               placeholder="Ingresá nombre del usuario..." autofocus>
                    </div>
                    <button class="z-btn z-btn--primary" id="btn-buscar">🔍 Buscar</button>
                    <button class="z-btn z-btn--accent"  id="btn-nuevo">✚ Nuevo</button>
                </div>
                <div class="z-search-result" id="search-result">
                    <div class="z-search-result__name"   id="result-name"></div>
                    <div class="z-search-result__detail" id="result-detail"></div>
                    <div id="result-list" style="margin-top:8px;"></div>
                    <div style="margin-top:10px;display:flex;gap:8px;" id="result-actions">
                        <button class="z-btn z-btn--sm z-btn--primary" id="btn-editar-encontrado"    style="display:none;">✏️ Editar</button>
                        <button class="z-btn z-btn--sm z-btn--ghost"   id="btn-consultar-encontrado" style="display:none;">👁 Consultar</button>
                        <button class="z-btn z-btn--sm z-btn--ghost"   id="btn-nuevo-forzar">✚ Alta nueva de todas formas</button>
                    </div>
                </div>
            </div>

            <!-- ═══ FORMULARIO ═══ -->
            <div class="z-card z-form-card" id="form-card" style="display:none;">
                <div class="z-card__header">
                    <h2 class="z-card__title">
                        👥 <span id="form-title">Alta de Usuario</span>
                    </h2>
                    <span class="z-form-state z-form-state--new" id="form-state">● NUEVO</span>
                </div>

                <div class="z-card__body">
                    <form id="form-usuario" autocomplete="off">
                        <input type="hidden" id="usr-id">

                        <!-- Estado activo (solo en edición/consulta) -->
                        <div id="activo-row" style="display:none;margin-bottom:1rem;">
                            <span class="z-label">Estado</span>
                            <span class="z-form-state z-user-activo" id="activo-badge">● ACTIVO</span>
                        </div>

                        <!-- ── Identificación ── -->
                        <div class="z-section-title">👤 Identificación</div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="usr-nombre">Nombre completo</label>
                                <input type="text" class="z-input" id="usr-nombre" placeholder="Nombre y apellido" maxlength="150" required>
                                <div class="z-input-error" id="err-nombre"></div>
                            </div>
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="usr-username">Nombre de usuario</label>
                                <input type="text" class="z-input" id="usr-username" placeholder="usuario.ejemplo" maxlength="50" required>
                                <div class="z-input-hint">Solo letras, números, puntos, guiones y guiones bajos.</div>
                                <div class="z-input-error" id="err-username"></div>
                            </div>
                        </div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="usr-nivel">Nivel de acceso</label>
                                <select class="z-select" id="usr-nivel" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="1">1 — Administrador</option>
                                    <option value="2">2 — Supervisor</option>
                                    <option value="3">3 — Operador</option>
                                    <option value="4">4 — Consultor</option>
                                </select>
                                <div class="z-input-error" id="err-nivel"></div>
                            </div>
                            <div class="z-form-group">
                                <label class="z-label" for="usr-cargo">Cargo / Rol</label>
                                <input type="text" class="z-input" id="usr-cargo" placeholder="Ej: Jefe de Sección" maxlength="100">
                            </div>
                        </div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label" for="usr-cuil">CUIL</label>
                                <input type="text" class="z-input" id="usr-cuil" placeholder="XX-XXXXXXXX-X" maxlength="13">
                                <div class="z-input-error" id="err-cuil"></div>
                            </div>
                            <div class="z-form-group" style="display:flex;align-items:flex-end;padding-bottom:0.5rem;gap:10px;">
                                <label class="z-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                    <input type="checkbox" id="usr-buc-acceso" style="width:17px;height:17px;cursor:pointer;">
                                    Acceso módulo BUC
                                </label>
                            </div>
                        </div>

                        <!-- ── Contraseña ── -->
                        <div class="z-section-title" style="margin-top:1rem;">🔐 Contraseña</div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label" id="lbl-password" for="usr-password">
                                    Contraseña <span id="password-req-star" class="z-label--required" style="display:none;">*</span>
                                </label>
                                <input type="password" class="z-input" id="usr-password" placeholder="Mínimo 8 caracteres" maxlength="100" autocomplete="new-password">
                                <div class="z-password-hint" id="password-hint">Mínimo 8 caracteres.</div>
                                <div class="z-input-error" id="err-password"></div>
                            </div>
                            <div class="z-form-group">
                                <label class="z-label" for="usr-password-confirm">Confirmar contraseña</label>
                                <input type="password" class="z-input" id="usr-password-confirm" placeholder="Repetir contraseña" maxlength="100" autocomplete="new-password">
                                <div class="z-input-error" id="err-password-confirm"></div>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="z-card__footer">
                    <button class="z-btn z-btn--ghost" id="btn-cancelar">✕ Salir</button>
                    <button class="z-btn z-btn--danger" id="btn-baja" style="display:none;">🚫 Dar de Baja</button>
                    <button class="z-btn z-btn--ghost"  id="btn-reactivar" style="display:none;">✅ Reactivar</button>
                    <button class="z-btn z-btn--ghost"  id="btn-editar" style="display:none;">✏️ Editar</button>
                    <button class="z-btn z-btn--accent z-btn--lg" id="btn-guardar" style="display:none;">💾 Guardar</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/validaciones.js"></script>
    <script src="js/usuarios.js"></script>
</body>
</html>
