<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZARIS — Padrón de Usuarios">
    <title>ZARIS — Usuarios</title>
    <script>if (window.self !== window.top) { var s = document.createElement('style'); s.textContent = '.z-header{display:none!important}'; document.head.appendChild(s); }</script>
    <link rel="stylesheet" href="styles.css?v=20260418-2">
    <style>
        .z-form-card { animation: z-scaleIn 0.4s var(--z-ease); }

        .z-search-panel {
            background: linear-gradient(135deg, #E3F2FD 0%, #F0F7FF 100%);
            border-radius: var(--z-radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1.5px solid #BBDEFB;
        }
        .z-search-panel__title {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--z-primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .z-search-result {
            background: var(--z-bg-card);
            border-radius: var(--z-radius);
            padding: 1rem 1.25rem;
            margin-top: 1rem;
            border: 1px solid var(--z-border);
            display: none;
            animation: z-slideDown 0.3s var(--z-ease);
        }
        .z-search-result.visible { display: block; }
        .z-search-result__name {
            font-weight: 700;
            color: var(--z-primary);
            font-size: 1.05rem;
        }
        .z-search-result__detail {
            font-size: 0.85rem;
            color: var(--z-text2);
            margin-top: 4px;
        }

        .z-form-state {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .z-form-state--new  { background: #E8F5E9; color: #2E7D32; }
        .z-form-state--edit { background: #FFF8E1; color: #F57F17; }
        .z-form-state--view { background: #E3F2FD; color: #1565C0; }

        .z-btn--xs {
            padding: 5px 10px;
            font-size: 0.72rem;
            white-space: nowrap;
            height: 32px;
        }

        .z-form-disabled .z-input,
        .z-form-disabled .z-select,
        .z-form-disabled .z-textarea {
            background: #F5F5F5;
            color: var(--z-text2);
            cursor: not-allowed;
        }

        /* ── Vista previa ── */
        .z-preview-section { margin-bottom: 1.5rem; }
        .z-preview-label {
            font-size: 0.70rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.07em; color: var(--z-text3);
            margin-bottom: 0.5rem; display: flex; align-items: center; gap: 6px;
        }
        .z-preview-rows { display: flex; flex-direction: column; gap: 4px; }
        .z-preview-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; padding: 0.45rem 0.85rem;
            background: var(--z-bg-card); border: 1px solid var(--z-border);
            border-radius: var(--z-radius); cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            font-size: 0.84rem; color: var(--z-text);
        }
        .z-preview-row:hover { border-color: var(--zaris-orange); background: rgba(245,78,0,0.03); }
        .z-preview-row__main { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .z-preview-row__meta { font-size: 0.75rem; color: var(--z-text3); white-space: nowrap; }
        .z-preview-row__action { font-size: 0.72rem; color: var(--zaris-orange); font-weight: 600; white-space: nowrap; opacity: 0; transition: opacity 0.15s; }
        .z-preview-row:hover .z-preview-row__action { opacity: 1; }

        /* ── Panel de listado ── */
        .z-filter-bar {
            display: flex; align-items: flex-end; gap: 0.75rem; flex-wrap: wrap;
            background: var(--z-bg-card); border: 1px solid var(--z-border);
            border-radius: var(--z-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem;
        }
        .z-filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
        .z-filter-group label { font-size: 0.70rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--z-text3); }
        .z-filter-group input, .z-filter-group select {
            background: transparent; border: 1px solid var(--z-border); color: var(--z-text);
            padding: 0.4rem 0.65rem; border-radius: var(--z-radius);
            font-size: 0.84rem; font-family: var(--z-font); outline: none;
            transition: border-color 0.15s;
        }
        .z-filter-group input:focus, .z-filter-group select:focus { border-color: var(--z-border-medium); }

        /* ── Tabla listado ── */
        .z-listado-wrap {
            overflow-x: auto; border-radius: var(--z-radius-lg);
            border: 1px solid var(--z-border); background: var(--z-bg-card);
            box-shadow: 0 1px 4px rgba(38,37,30,.06);
        }
        .z-listado-wrap table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
        .z-listado-wrap thead th {
            background: var(--surface-400); color: var(--z-text2); font-weight: 600;
            font-size: 0.70rem; text-transform: uppercase; letter-spacing: 0.05em;
            padding: 0.65rem 1rem; text-align: left; white-space: nowrap;
        }
        .z-listado-wrap tbody tr { border-top: 1px solid var(--z-border); }
        .z-listado-wrap tbody tr:hover { background: var(--surface-400); }
        .z-listado-wrap tbody td { padding: 0.6rem 1rem; color: var(--z-text); vertical-align: middle; }
        .z-listado-wrap td.mono { font-family: var(--z-font-mono); font-size: 0.78rem; color: var(--z-text2); }
        .z-listado-wrap .z-tbl-btn {
            border: 1px solid var(--z-border); background: transparent; color: var(--z-text2);
            padding: 0.25rem 0.6rem; border-radius: var(--z-radius-sm); cursor: pointer;
            font-size: 0.75rem; font-family: var(--z-font); transition: all 0.15s;
        }
        .z-listado-wrap .z-tbl-btn:hover { border-color: var(--zaris-orange); color: var(--zaris-orange); }

        @media print {
            .z-header, .z-breadcrumb, .z-search-panel,
            .z-filter-bar, .z-card__footer, .z-preview-section,
            .z-listado-wrap .z-tbl-btn { display: none !important; }
            .z-listado-print-header { display: block !important; text-align: center; margin-bottom: 1.5rem; }
            .z-listado-print-header h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.2rem; }
            .z-listado-print-header p  { font-size: 0.78rem; color: #666; }
        }
        .z-listado-print-header { display: none; }
    </style>
</head>
<body>
    <div class="z-app">
        <header class="z-header">
            <a href="mainconfig.html" class="z-header__brand">
                <span>
                    <span class="z-header__title">ZARIS</span>
                    <span class="z-header__subtitle">Gestión Estatal</span>
                </span>
            </a>
            <nav class="z-header__nav">
                <a href="#" class="z-header__btn" onclick="(window.parent.shellNavigate||function(){window.location='../index.html'})('frontend/welcome.html');return false">← Inicio</a>
            </nav>
        </header>

        <main class="z-main">
            <nav class="z-breadcrumb">
                <a href="#" onclick="(window.parent.shellNavigate||function(){window.location='../index.html'})('frontend/welcome.html');return false">INICIO</a>
                <span class="z-breadcrumb__sep">›</span>
                <a href="mainconfig.html">Configuración</a>
                <span class="z-breadcrumb__sep">›</span>
                <span class="z-breadcrumb__current">Padrón Usuarios</span>
            </nav>

            <!-- ═══════════ BÚSQUEDA ═══════════ -->
            <div class="z-search-panel" id="search-panel">
                <div class="z-search-panel__title">
                    🔍 Buscar Usuario Existente
                </div>
                <div style="display:flex;gap:6px;margin-bottom:0.6rem;">
                    <button type="button" class="z-btn z-btn--xs z-btn--primary" id="btn-modo-texto"  title="Buscar por nombre">Aa Nombre</button>
                    <button type="button" class="z-btn z-btn--xs z-btn--ghost"   id="btn-modo-numero" title="Buscar por CUIL o usuario"># CUIL / Usuario</button>
                </div>
                <div class="z-search-box">
                    <div class="z-form-group">
                        <input type="text" class="z-input" id="search-query"
                               placeholder="Ingresá nombre del usuario..."
                               autofocus>
                    </div>
                    <button class="z-btn z-btn--primary" id="btn-buscar">
                        🔍 Buscar
                    </button>
                    <button class="z-btn z-btn--accent" id="btn-nuevo">
                        ✚ Nuevo
                    </button>
                    <button class="z-btn z-btn--ghost" id="btn-listado">
                        Listado
                    </button>
                </div>
                <div class="z-search-result" id="search-result">
                    <div class="z-search-result__name"   id="result-name"></div>
                    <div class="z-search-result__detail" id="result-detail"></div>
                    <div id="result-list" style="margin-top:8px;"></div>
                    <div style="margin-top:10px;display:flex;gap:8px;" id="result-actions">
                        <button class="z-btn z-btn--sm z-btn--primary" id="btn-editar-encontrado"    style="display:none;">✏️ Editar</button>
                        <button class="z-btn z-btn--sm z-btn--ghost"   id="btn-consultar-encontrado" style="display:none;">👁 Consultar</button>
                        <button class="z-btn z-btn--sm z-btn--ghost"   id="btn-nuevo-forzar">✚ Alta nueva de todas formas</button>
                    </div>
                </div>
            </div>

            <!-- ═══════════ VISTA PREVIA ═══════════ -->
            <div class="z-preview-section" id="preview-section">
                <div class="z-preview-label">Últimos usuarios ingresados</div>
                <div class="z-preview-rows" id="preview-rows">
                    <div style="color:var(--z-text3);font-size:0.82rem;">Cargando...</div>
                </div>
            </div>

            <!-- ═══════════ LISTADO COMPLETO ═══════════ -->
            <div id="listado-section" style="display:none;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:1rem;">
                    <h2 style="font-size:1.05rem;font-weight:700;color:var(--z-primary);">Listado de Usuarios</h2>
                    <div style="display:flex;gap:0.5rem;">
                        <button class="z-btn z-btn--ghost" onclick="window.print()">Imprimir</button>
                        <button class="z-btn z-btn--ghost" id="btn-cerrar-listado">← Volver</button>
                    </div>
                </div>
                <div class="z-filter-bar">
                    <div class="z-filter-group">
                        <label>Buscar texto</label>
                        <input type="text" id="lst-texto" placeholder="Nombre o usuario..." style="min-width:160px;">
                    </div>
                    <div class="z-filter-group">
                        <label>Ordenar</label>
                        <select id="lst-orden">
                            <option value="reciente">Más reciente primero</option>
                            <option value="az">A → Z</option>
                            <option value="za">Z → A</option>
                            <option value="antiguo">Más antiguo primero</option>
                        </select>
                    </div>
                    <div class="z-filter-group">
                        <label>Fecha alta desde</label>
                        <input type="date" id="lst-desde">
                    </div>
                    <div class="z-filter-group">
                        <label>Fecha alta hasta</label>
                        <input type="date" id="lst-hasta">
                    </div>
                    <div style="display:flex;gap:0.5rem;align-self:flex-end;">
                        <button class="z-btn z-btn--primary z-btn--sm" id="btn-filtrar-lst">Filtrar</button>
                        <button class="z-btn z-btn--ghost z-btn--sm"   id="btn-limpiar-lst">Limpiar</button>
                    </div>
                </div>
                <div class="z-listado-print-header" id="lst-print-header"></div>
                <div id="listado-contenido"></div>
            </div>

            <!-- ═══════════ FORMULARIO USUARIO ═══════════ -->
            <div class="z-card z-form-card" id="form-card" style="display:none;">
                <div class="z-card__header">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <h2 class="z-card__title">
                            👥 <span id="form-title">Alta de Usuario</span>
                        </h2>
                        <span class="z-badge z-badge--success" id="badge-activo" style="display:none;">Activo</span>
                    </div>
                    <span class="z-form-state z-form-state--new" id="form-state">● NUEVO</span>
                </div>

                <div class="z-card__body" id="form-body">
                    <form id="form-usuario" autocomplete="off">
                        <input type="hidden" id="usr-id">

                        <!-- ── Identificación ── -->
                        <div class="z-section-title">📋 Identificación</div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="usr-nombre">Nombre completo</label>
                                <input type="text" class="z-input" id="usr-nombre"
                                       placeholder="Nombre y apellido" maxlength="150" required>
                                <div class="z-input-error" id="err-nombre"></div>
                            </div>
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="usr-username">Nombre de usuario</label>
                                <input type="text" class="z-input" id="usr-username"
                                       placeholder="usuario.ejemplo" maxlength="50" required>
                                <div class="z-input-hint">Solo letras, números, puntos y guiones.</div>
                                <div class="z-input-error" id="err-username"></div>
                            </div>
                        </div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="usr-nivel">Nivel de acceso</label>
                                <select class="z-select" id="usr-nivel" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="1">1 — Administrador</option>
                                    <option value="2">2 — Supervisor</option>
                                    <option value="3">3 — Operador</option>
                                    <option value="4">4 — Consultor</option>
                                </select>
                                <div class="z-input-error" id="err-nivel"></div>
                            </div>
                            <div class="z-form-group">
                                <label class="z-label" for="usr-cargo">Cargo / Rol</label>
                                <input type="text" class="z-input" id="usr-cargo"
                                       placeholder="Ej: Jefe de Sección" maxlength="100">
                            </div>
                        </div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label" for="usr-cuil">CUIL</label>
                                <input type="text" class="z-input" id="usr-cuil"
                                       placeholder="XX-XXXXXXXX-X" maxlength="13">
                                <div class="z-input-error" id="err-cuil"></div>
                            </div>
                            <div class="z-form-group" style="display:flex;align-items:flex-end;padding-bottom:1.1rem;">
                                <label class="z-checkbox">
                                    <input type="checkbox" id="usr-buc-acceso">
                                    <span class="z-checkbox__label">Acceso módulo BUC</span>
                                </label>
                            </div>
                        </div>

                        <!-- ── Contraseña ── -->
                        <div class="z-section-title" style="margin-top:1rem;">🔐 Contraseña</div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label" id="lbl-password" for="usr-password">
                                    Nueva contraseña
                                    <span id="password-req-star" style="color:var(--z-text-error);display:none;"> *</span>
                                </label>
                                <input type="password" class="z-input" id="usr-password"
                                       placeholder="Mínimo 8 caracteres" maxlength="100"
                                       autocomplete="new-password">
                                <div class="z-input-hint" id="password-hint">Mínimo 8 caracteres.</div>
                                <div class="z-input-error" id="err-password"></div>
                            </div>
                            <div class="z-form-group">
                                <label class="z-label" for="usr-password-confirm">Confirmar contraseña</label>
                                <input type="password" class="z-input" id="usr-password-confirm"
                                       placeholder="Repetir contraseña" maxlength="100"
                                       autocomplete="new-password">
                                <div class="z-input-error" id="err-password-confirm"></div>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="z-card__footer">
                    <button class="z-btn z-btn--ghost"   id="btn-cancelar">✕ Cancelar</button>
                    <button class="z-btn z-btn--danger"  id="btn-baja"      style="display:none;">🚫 Dar de Baja</button>
                    <button class="z-btn z-btn--success" id="btn-reactivar" style="display:none;">✅ Reactivar</button>
                    <button class="z-btn z-btn--ghost"   id="btn-editar"    style="display:none;">✏️ Editar</button>
                    <button class="z-btn z-btn--primary z-btn--lg" id="btn-guardar" style="display:none;">💾 Guardar Usuario</button>
                </div>
            </div>
        </main>
    </div>

    <div class="z-toast-container" id="toast-container"></div>

    <script src="js/config.js?v=20260418-2"></script>
    <script src="js/validaciones.js?v=20260418-2"></script>
    <script src="js/usuarios.js?v=20260418-2"></script>
</body>
</html>
